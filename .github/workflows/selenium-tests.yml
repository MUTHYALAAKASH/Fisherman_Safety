name: Fisherman Safety E2E CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. Setup Java & Start Backend
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and Package Spring Boot Backend
      run: |
        cd backend
        mvn clean package -DskipTests

    - name: Run Spring Boot Backend in Background
      run: |
        cd backend
        java -jar target/safety-1.0.0.jar &
      env:
        SPRING_PROFILES_ACTIVE: dev

    # 2. Setup Node.js & Start Frontend
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web-frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: |
        cd web-frontend
        npm ci

    - name: Start Vite Frontend Server in Background
      run: |
        cd web-frontend
        npm run dev &

    # 3. Wait for Servers to be Ready
    - name: Wait for Backend and Frontend Servers
      run: |
        echo "Waiting for Spring Boot backend to respond..."
        until curl -s http://localhost:8080/api-docs > /dev/null; do
          sleep 2
        done
        echo "Spring Boot backend is up!"

        echo "Waiting for Vite frontend to respond..."
        until curl -s http://localhost:5173 > /dev/null; do
          sleep 2
        done
        echo "Vite frontend is up!"

    # 4. Setup Python & Run Selenium Tests
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        cd web-frontend/selenium_tests
        pip install -r requirements.txt

    - name: Run Pytest Login Test Only
      run: |
        cd web-frontend/selenium_tests
        pytest -v -k "test_func_auth_flow" --tb=short

    # 5. Archive Excel Test Report
    - name: Upload Test Report Dashboard
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: E2E-Selenium-Report
        path: web-frontend/selenium_tests/selenium_test_report.xlsx

    - name: Upload QA Test Case Suites
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: QA-Test-Case-Suites
        path: |
          Appium_Test_Cases_300.xlsx
          Selenium_Test_Cases_300.xlsx
          Load_Test_Cases_200.xlsx
          Vulnerability_Test_Cases_100.xlsx

    # 6. Deploy to GitHub Pages (Only on main push, if tests pass)
    - name: Build Frontend for Production
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        cd web-frontend
        npm run build

    - name: Deploy Frontend to GitHub Pages
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./web-frontend/dist
